<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SVG装飾 10案</title>
<style>
  body { background:#0C0B18; color:#ECE6D6; font-family:'Hiragino Sans',sans-serif; margin:0; padding:40px 20px; }
  h1 { text-align:center; font-size:18px; letter-spacing:.2em; color:#E3BE83; margin-bottom:40px; font-weight:300; }
  .grid { display:grid; grid-template-columns:repeat(5,1fr); gap:24px; max-width:1100px; margin:0 auto; }
  @media(max-width:800px){ .grid{ grid-template-columns:repeat(2,1fr); } }
  .card { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); border-radius:12px; padding:28px 16px 18px; text-align:center; transition:all .3s; }
  .card:hover { background:rgba(227,190,131,.07); border-color:rgba(227,190,131,.28); transform:translateY(-4px); }
  .card svg { width:110px; height:110px; color:#E3BE83; opacity:.75; display:block; margin:0 auto; }
  .num { font-size:11px; letter-spacing:.18em; color:#E3BE83; margin-top:14px; }
  .name { font-size:12px; color:#7A7090; margin-top:4px; }

  @keyframes spin    { to{ transform:rotate(360deg); } }
  @keyframes spinRev { to{ transform:rotate(-360deg); } }
  @keyframes ripple  { 0%,100%{opacity:.15;transform:scale(1.12)} 50%{opacity:.85;transform:scale(1)} }
  @keyframes moonArc { 0%,100%{transform:scaleX(1)} 50%{transform:scaleX(-1)} }
  @keyframes sway    { 0%,100%{transform:rotate(-4deg)} 50%{transform:rotate(4deg)} }
  @keyframes twinkle { 0%,100%{opacity:.25} 50%{opacity:1} }
  @keyframes drawPath{ from{stroke-dashoffset:650} to{stroke-dashoffset:0} }
  @keyframes float   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  @keyframes pulse   { 0%,100%{transform:scale(1);opacity:.6} 50%{transform:scale(1.18);opacity:1} }

  /* ① 蓮 */
  #lotus { animation:spin 18s linear infinite; transform-origin:100px 115px; }
  /* ② 曼荼羅 */
  #mand-out { animation:spin 28s linear infinite; transform-origin:100px 100px; }
  #mand-in  { animation:spinRev 18s linear infinite; transform-origin:100px 100px; }
  /* ③ 波紋 */
  #rip1{animation:ripple 3s ease-in-out     infinite;transform-origin:100px 100px;}
  #rip2{animation:ripple 3s ease-in-out .5s  infinite;transform-origin:100px 100px;}
  #rip3{animation:ripple 3s ease-in-out 1.0s infinite;transform-origin:100px 100px;}
  #rip4{animation:ripple 3s ease-in-out 1.5s infinite;transform-origin:100px 100px;}
  /* ④ 月 */
  #moon-arc{animation:moonArc 7s ease-in-out infinite;transform-origin:100px 100px;}
  /* ⑤ 葉脈 */
  #leaf{animation:sway 5s ease-in-out infinite;transform-origin:100px 175px;}
  /* ⑥ 星座 */
  .star{animation:twinkle 2s ease-in-out infinite;}
  .s2{animation-delay:.45s} .s3{animation-delay:.9s} .s4{animation-delay:1.35s} .s5{animation-delay:1.8s}
  /* ⑦ ∞ */
  #inf-path{stroke-dasharray:650;animation:drawPath 4s ease-in-out infinite alternate;}
  #inf-dot{animation:spin 5s linear infinite;transform-origin:100px 100px;}
  /* ⑧ 格子 */
  #sq1{animation:spin    22s linear infinite;transform-origin:100px 100px;}
  #sq2{animation:spinRev 15s linear infinite;transform-origin:100px 100px;}
  #sq3{animation:spin    9s  linear infinite;transform-origin:100px 100px;}
  /* ⑨ トリシュール */
  #tri{animation:float 4s ease-in-out infinite;}
  /* ⑩ ひし形 */
  #dia1{animation:pulse 3s ease-in-out   infinite;transform-origin:100px 100px;}
  #dia2{animation:pulse 3s ease-in-out .6s infinite reverse;transform-origin:100px 100px;}
</style>
</head>
<body>
<h1>SVG 装飾 — 10案（アニメーション）</h1>
<div class="grid">

  <!-- ① 蓮 -->
  <div class="card">
    <svg viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="1.2">
      <g id="lotus">
        <ellipse cx="100" cy="115" rx="14" ry="30" transform="rotate(-40 100 115)"/>
        <ellipse cx="100" cy="115" rx="14" ry="30" transform="rotate(-20 100 115)"/>
        <ellipse cx="100" cy="115" rx="14" ry="30"/>
        <ellipse cx="100" cy="115" rx="14" ry="30" transform="rotate(20 100 115)"/>
        <ellipse cx="100" cy="115" rx="14" ry="30" transform="rotate(40 100 115)"/>
        <circle cx="100" cy="115" r="10"/>
      </g>
    </svg>
    <div class="num">① 蓮（ロータス）</div>
    <div class="name">ゆっくり回転</div>
  </div>

  <!-- ② 曼荼羅リング -->
  <div class="card">
    <svg viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="0.9">
      <g id="mand-out">
        <circle cx="100" cy="100" r="75"/>
        <circle cx="100" cy="25"  r="7"/><circle cx="100" cy="175" r="7"/>
        <circle cx="25"  cy="100" r="7"/><circle cx="175" cy="100" r="7"/>
        <circle cx="47"  cy="47"  r="7"/><circle cx="153" cy="47"  r="7"/>
        <circle cx="47"  cy="153" r="7"/><circle cx="153" cy="153" r="7"/>
      </g>
      <g id="mand-in">
        <circle cx="100" cy="100" r="55"/>
        <circle cx="100" cy="100" r="35"/>
        <circle cx="100" cy="100" r="12"/>
      </g>
    </svg>
    <div class="num">② 曼荼羅リング</div>
    <div class="name">外輪と内輪が逆回転</div>
  </div>

  <!-- ③ 波紋 -->
  <div class="card">
    <svg viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="1">
      <ellipse id="rip1" cx="100" cy="100" rx="18" ry="7"/>
      <ellipse id="rip2" cx="100" cy="100" rx="42" ry="17"/>
      <ellipse id="rip3" cx="100" cy="100" rx="66" ry="27"/>
      <ellipse id="rip4" cx="100" cy="100" rx="90" ry="37"/>
    </svg>
    <div class="num">③ 波紋（水面）</div>
    <div class="name">外から内へパルス</div>
  </div>

  <!-- ④ 月の満ち欠け -->
  <div class="card">
    <svg viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="1">
      <circle cx="100" cy="100" r="65"/>
      <g id="moon-arc">
        <path d="M100,35 A65,65 0 0,1 100,165"/>
        <path d="M100,52 A48,48 0 0,1 100,148"/>
      </g>
      <circle cx="100" cy="100" r="10" fill="currentColor" opacity=".25"/>
    </svg>
    <div class="num">④ 月の満ち欠け</div>
    <div class="name">弧が左右に反転</div>
  </div>

  <!-- ⑤ 葉脈 -->
  <div class="card">
    <svg viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="1.1">
      <g id="leaf">
        <path d="M100,175 Q58,105 100,28 Q142,105 100,175Z"/>
        <line x1="100" y1="28"  x2="100" y2="175"/>
        <line x1="100" y1="72"  x2="74"  y2="98"/> <line x1="100" y1="72"  x2="126" y2="98"/>
        <line x1="100" y1="105" x2="70"  y2="122"/><line x1="100" y1="105" x2="130" y2="122"/>
        <line x1="100" y1="138" x2="80"  y2="152"/><line x1="100" y1="138" x2="120" y2="152"/>
      </g>
    </svg>
    <div class="num">⑤ 葉脈</div>
    <div class="name">左右にゆらゆら</div>
  </div>

  <!-- ⑥ 星座 -->
  <div class="card">
    <svg viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="0.8">
      <line x1="58"  y1="48"  x2="100" y2="78"/>
      <line x1="100" y1="78"  x2="152" y2="58"/>
      <line x1="152" y1="58"  x2="142" y2="118"/>
      <line x1="142" y1="118" x2="78"  y2="142"/>
      <line x1="78"  y1="142" x2="58"  y2="48"/>
      <line x1="100" y1="78"  x2="78"  y2="142"/>
      <circle class="star"    cx="58"  cy="48"  r="3.5" fill="currentColor"/>
      <circle class="star s2" cx="100" cy="78"  r="5"   fill="currentColor"/>
      <circle class="star s3" cx="152" cy="58"  r="3.5" fill="currentColor"/>
      <circle class="star s4" cx="142" cy="118" r="4"   fill="currentColor"/>
      <circle class="star s5" cx="78"  cy="142" r="5"   fill="currentColor"/>
    </svg>
    <div class="num">⑥ 星座</div>
    <div class="name">星がきらめく</div>
  </div>

  <!-- ⑦ インフィニティ -->
  <div class="card">
    <svg viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="1.4">
      <path id="inf-path" d="M55,100 C55,65 90,65 100,100 C110,135 145,135 145,100 C145,65 110,65 100,100 C90,135 55,135 55,100Z"/>
      <g id="inf-dot">
        <circle cx="130" cy="85" r="4" fill="currentColor" opacity=".6"/>
      </g>
    </svg>
    <div class="num">⑦ インフィニティ ∞</div>
    <div class="name">パスが描かれる</div>
  </div>

  <!-- ⑧ 格子 -->
  <div class="card">
    <svg viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="0.8">
      <rect id="sq1" x="55" y="55" width="90"  height="90"/>
      <rect id="sq2" x="45" y="45" width="110" height="110"/>
      <rect id="sq3" x="35" y="35" width="130" height="130"/>
      <circle cx="100" cy="100" r="6" fill="currentColor" opacity=".25"/>
    </svg>
    <div class="num">⑧ 格子（正方形）</div>
    <div class="name">各レイヤーが逆回転</div>
  </div>

  <!-- ⑨ トリシュール -->
  <div class="card">
    <svg viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="1.2">
      <g id="tri">
        <line x1="100" y1="165" x2="100" y2="45"/>
        <path d="M100,80 Q78,63 76,45 Q91,55 100,80"/>
        <path d="M100,80 Q122,63 124,45 Q109,55 100,80"/>
        <path d="M100,92 Q73,80 62,62 Q78,72 100,92"/>
        <path d="M100,92 Q127,80 138,62 Q122,72 100,92"/>
        <circle cx="100" cy="170" r="6" fill="currentColor" opacity=".3"/>
      </g>
    </svg>
    <div class="num">⑨ トリシュール</div>
    <div class="name">ふわふわ浮遊</div>
  </div>

  <!-- ⑩ 十字＋ひし形 -->
  <div class="card">
    <svg viewBox="0 0 200 200" fill="none" stroke="currentColor" stroke-width="1">
      <line x1="100" y1="36"  x2="100" y2="164"/>
      <line x1="36"  y1="100" x2="164" y2="100"/>
      <rect id="dia1" x="76" y="76" width="48" height="48" transform="rotate(45 100 100)"/>
      <rect id="dia2" x="88" y="88" width="24" height="24" transform="rotate(45 100 100)"/>
      <circle cx="100" cy="100" r="7" fill="currentColor" opacity=".2"/>
    </svg>
    <div class="num">⑩ 十字＋ひし形</div>
    <div class="name">ひし形が脈打つ</div>
  </div>

</div>
</body>
</html>
